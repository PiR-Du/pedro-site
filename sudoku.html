<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculateur de carré</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e10;
      --surface: #18181c;
      --border: #2a2a32;
      --accent: #c8f135;
      --text: #e8e8ec;
      --muted: #6b6b78;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .badge {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.9rem;
      font-weight: 800;
      line-height: 1.1;
    }

    .field { display: flex; flex-direction: column; gap: 0.6rem; }

    label {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    input[type="number"] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 1.1rem;
      padding: 0.9rem 1rem;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type="number"]:focus { border-color: var(--accent); }
    input[type="number"]:disabled { opacity: 0.4; cursor: not-allowed; }

    button {
      background: var(--accent);
      color: #0e0e10;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      padding: 0.9rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    button:hover:not(:disabled) { opacity: 0.88; }
    button:active:not(:disabled) { transform: scale(0.98); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .result-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.2rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      min-height: 80px;
      justify-content: center;
      transition: border-color 0.3s;
    }
    .result-box.has-result { border-color: var(--accent); }

    .result-label {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .result-value {
      font-size: 2rem;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      color: var(--accent);
    }
    .result-value.empty {
      font-size: 0.95rem;
      font-family: 'DM Mono', monospace;
      font-weight: 400;
      color: var(--muted);
    }

    .error { color: #ff6b6b; font-size: 0.8rem; margin-top: -1rem; }
  </style>
</head>
<body>
  <div class="card">
    <header style="display:flex;flex-direction:column;gap:0.4rem">
      <span class="badge">Python · WebAssembly</span>
      <h1>Carré d'un nombre</h1>
    </header>

    <div class="field">
      <label for="nombre">Nombre</label>
      <input type="number" id="nombre" placeholder="ex: 12" disabled />
    </div>

    <button id="btn" onclick="calculer()" disabled>Chargement de Python…</button>

    <div>
      <div class="result-box" id="result-box">
        <span class="result-label">Résultat</span>
        <span class="result-value empty" id="resultat">En attente…</span>
      </div>
      <p class="error" id="erreur"></p>
    </div>
  </div>

  <script>
    // ----- Code Python exécuté dans le navigateur -----
    const codePython = `
def calculer_carre(n):
    return n ** 2
`;

    // Chargement de Pyodide au démarrage
    let pyodide;
    async function init() {
      pyodide = await loadPyodide();
      await pyodide.runPythonAsync(codePython);

      document.getElementById('btn').textContent = 'Calculer x²';
      document.getElementById('btn').disabled = false;
      document.getElementById('nombre').disabled = false;
      document.getElementById('nombre').focus();
    }
    init();

    // ----- Appel de la fonction Python depuis JS -----
    function calculer() {
      const input = document.getElementById('nombre');
      const resultEl = document.getElementById('resultat');
      const erreurEl = document.getElementById('erreur');
      const box = document.getElementById('result-box');

      erreurEl.textContent = '';
      const val = input.value.trim();

      if (val === '') {
        erreurEl.textContent = 'Merci de saisir un nombre.';
        return;
      }

      try {
        const resultat = pyodide.runPython(`calculer_carre(${parseFloat(val)})`);
        resultEl.textContent = resultat;
        resultEl.className = 'result-value';
        box.classList.add('has-result');
      } catch (e) {
        erreurEl.textContent = 'Erreur Python : ' + e.message;
        resultEl.className = 'result-value empty';
        box.classList.remove('has-result');
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') calculer();
    });
  </script>
</body>
</html>
