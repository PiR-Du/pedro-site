<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Solveur de Sudoku - Pierre Duchesne</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" />
  <script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
</head>
<body data-root=".." data-page="sudoku">

  <div id="site-header"></div>

  <main>
    <section class="sudoku-page">
      <p class="eyebrow">./projets/sudoku</p>
      <h1>Solveur de Sudoku</h1>
      <p class="lead">
        Backtracking en Python, execute dans votre navigateur via
        <span class="mono">Pyodide</span>.
      </p>

      <div class="status-bar loading" id="status">
        <span class="dot"></span>
        <span id="status-msg">Chargement de Python...</span>
      </div>

      <div class="sudoku-layout">
        <div class="grid-wrapper">
          <div class="grid" id="grid" role="grid" aria-label="Grille de Sudoku"></div>
        </div>

        <div class="controls-panel">
          <div class="numpad" id="numpad"></div>

          <div class="actions">
            <button class="btn btn-primary" id="btn-solve" disabled>Resoudre</button>
            <button class="btn btn-outline btn-danger" id="btn-reset">Effacer tout</button>
          </div>
        </div>
      </div>

      <p class="hint">Astuce : fleches pour naviguer, 1-9 pour saisir, Suppr pour effacer.</p>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="../shared-layout.js"></script>
  <script src="app.js"></script>
</body>
</html>
