<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sudoku Solver</title>
  <link rel="stylesheet" href="../style.css">
  <script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
  
</head>

<body>
  <div class="wrapper">
    <header>
      <h1>Sudoku Solver</h1>
    </header>

    <div class="status-bar loading" id="status">Chargement de Python…</div>

    <div class="grid-wrapper">
      <div class="grid" id="grid"></div>
    </div>

    <div class="numpad" id="numpad"></div>

    <div class="actions">
      <button class="btn btn-solve" id="btn-solve" onclick="solveGrid()" disabled>Résoudre</button>
      <button class="btn btn-reset" onclick="resetGrid()">Effacer tout</button>
    </div>
  </div>

  <script>
    // ── État
    let selected = null;
    let given    = new Set();
    let pyodide  = null;

    // ── Construction grille
    const gridEl = document.getElementById('grid');
    for (let i = 0; i < 81; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.index = i;
      cell.dataset.row   = Math.floor(i / 9);
      cell.dataset.col   = i % 9;
      cell.addEventListener('click', () => selectCell(i));
      gridEl.appendChild(cell);
    }

    // ── Pavé numérique
    const numpad = document.getElementById('numpad');
    for (let n = 1; n <= 9; n++) {
      const btn = document.createElement('button');
      btn.className   = 'num-btn';
      btn.textContent = n;
      btn.addEventListener('click', () => enterNumber(n));
      numpad.appendChild(btn);
    }
    const eraseBtn = document.createElement('button');
    eraseBtn.className   = 'num-btn erase';
    eraseBtn.textContent = 'Effacer';
    eraseBtn.addEventListener('click', () => enterNumber(0));
    numpad.appendChild(eraseBtn);

    // ── Sélection
    function selectCell(index) {
      selected = index;
      refreshHighlights();
    }

    function refreshHighlights() {
      const selVal = selected !== null ? getCellValue(selected) : 0;
      Array.from(gridEl.children).forEach((cell, i) => {
        cell.classList.remove('selected', 'same-num');
        if (i === selected) cell.classList.add('selected');
        else if (selVal > 0 && getCellValue(i) === selVal) cell.classList.add('same-num');
      });
    }

    function getCellValue(index) {
      const v = parseInt(gridEl.children[index].textContent.trim());
      return isNaN(v) ? 0 : v;
    }

    // ── Saisie
    function enterNumber(n) {
      if (selected === null) return;
      const cell = gridEl.children[selected];
      cell.classList.remove('solved-cell', 'given');
      if (n === 0) {
        cell.textContent = '';
        given.delete(selected);
      } else {
        cell.textContent = n;
        cell.classList.add('given');
        given.add(selected);
      }
      refreshHighlights();
    }

    document.addEventListener('keydown', e => {
      if (selected === null) return;
      if (e.key >= '1' && e.key <= '9') { enterNumber(parseInt(e.key)); return; }
      if (e.key === 'Backspace' || e.key === 'Delete' || e.key === '0') { enterNumber(0); return; }
      const moves = { ArrowUp: -9, ArrowDown: 9, ArrowLeft: -1, ArrowRight: 1 };
      if (moves[e.key] !== undefined) {
        e.preventDefault();
        const next = selected + moves[e.key];
        if (next >= 0 && next < 81) selectCell(next);
      }
    });

    // ── Reset / Exemple
    function resetGrid() {
      given.clear(); selected = null;
      Array.from(gridEl.children).forEach(cell => {
        cell.textContent = '';
        const row = cell.dataset.row, col = cell.dataset.col;
        cell.className = 'cell';
        cell.dataset.row = row; cell.dataset.col = col;
      });
      setStatus('ready', 'Saisissez votre grille');
    }

    function loadExample() {
      resetGrid();
      EXAMPLE.forEach((val, i) => {
        if (val !== 0) {
          gridEl.children[i].textContent = val;
          gridEl.children[i].classList.add('given');
          given.add(i);
        }
      });
    }

    // ── Résolution Python
    async function solveGrid() {
      if (!pyodide) return;
      const flat = Array.from(gridEl.children).map((c, i) => getCellValue(i));

      setStatus('loading', 'Résolution en cours…');
      document.getElementById('btn-solve').disabled = true;

      try {
        pyodide.globals.set('input_grid', pyodide.toPy(flat));
        const result = pyodide.runPython(`
            from solver import solve_sudoku
            result = solve_sudoku(list(input_grid))
            result
            `);

        if (result === null || result === undefined) {
          setStatus('error', 'Aucune solution trouvée pour cette grille');
        } else {
          const solved = result.toJs();
          solved.forEach((val, i) => {
            if (!given.has(i)) {
              setTimeout(() => {
                gridEl.children[i].textContent = val;
                gridEl.children[i].classList.add('solved-cell');
              }, i * 8);
            }
          });
          setTimeout(() => setStatus('solved', 'Grille résolue !'), 81 * 8 + 100);
        }
      } catch(e) {
        setStatus('error', 'Erreur : ' + e.message);
      }

      document.getElementById('btn-solve').disabled = false;
    }

    // ── Statut
    function setStatus(type, msg) {
      const el = document.getElementById('status');
      el.className = 'status-bar ' + type;
      el.textContent = msg;
    }

    // ── Init Pyodide
    async function init() {
      try {
        pyodide = await loadPyodide();
        const code = await (await fetch('solver.py')).text();
        pyodide.FS.writeFile('/home/pyodide/solver.py', code);
        pyodide.runPython(`import sys; sys.path.insert(0, '/home/pyodide')`);
        setStatus('ready', 'Prêt — Saisissez votre grille');
        document.getElementById('btn-solve').disabled = false;
      } catch(e) {
        setStatus('error', 'Erreur de chargement : ' + e.message);
      }
    }
    init();
  </script>
</body>
</html>
