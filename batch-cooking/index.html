<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Batch Cooking - Simplifié</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" />
  <style>
    .batch-container { max-width: 800px; margin: 0 auto; padding: 4rem 1.5rem; }
    .selector-box { 
      background: var(--surface); 
      border: 1px solid var(--border); 
      border-radius: 1rem; 
      padding: 2rem; 
      box-shadow: var(--shadow-soft);
      margin-bottom: 3rem;
    }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .tab-btn {
      flex: 1; padding: 0.75rem; border-radius: 0.5rem;
      border: 1px solid var(--border); background: var(--surface-soft);
      cursor: pointer; transition: all 0.2s; font-weight: 500;
    }
    .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
    
    .input-group { display: flex; flex-direction: column; gap: 0.5rem; }
    .input-group select {
      padding: 0.75rem; border-radius: 0.5rem; border: 1px solid var(--border);
      font-size: 1rem; background: var(--surface);
    }
    #selectors-container select { margin-bottom: 0.5rem; }
    #selectors-container select:last-child { margin-bottom: 0; }
    
    .generate-btn {
      width: 100%; margin-top: 1.5rem; padding: 1rem; border-radius: 0.5rem;
      background: var(--primary); color: white; border: none;
      font-weight: 600; cursor: pointer; transition: transform 0.1s;
    }
    .generate-btn:active { transform: scale(0.98); }
    
    .plan-grid { display: grid; gap: 1rem; }
    .day-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 0.75rem; padding: 1.25rem; display: flex; gap: 1rem;
      align-items: center;
    }
    .day-label { 
      font-family: var(--font-mono); font-size: 0.75rem; color: var(--primary);
      text-transform: uppercase; writing-mode: vertical-lr; transform: rotate(180deg);
      border-right: 1px solid var(--border); padding-left: 0.5rem;
    }
    .meal-info h3 { font-family: var(--font-serif); font-size: 1.5rem; }
    .meal-ingredients { font-size: 0.85rem; color: var(--muted-foreground); margin-top: 0.25rem; }
  </style>
</head>
<body data-root=".." data-page="batch-cooking">

  <div id="site-header"></div>

  <main>
    <section class="hero">
      <div class="grid-bg" aria-hidden="true"></div>
      <div class="inner">
        <p class="eyebrow">./projets/batch-cooking</p>
        <h1>Organisez votre semaine <span class="text-gradient">en un clic</span>.</h1>
        <p class="lead">Choisissez votre point de départ, nous nous occupons du reste.</p>
      </div>
    </section>

    <div class="batch-container">
      <div class="selector-box">
      <div class="tabs">
        <button class="tab-btn active" onclick="setMode('meal')">Partir d'un plat</button>
        <button class="tab-btn" onclick="setMode('ingredient')">Partir d'un ingrédient</button>
      </div>

      <div class="input-group">
        <label id="select-label">Quel plat vous fait envie ?</label>
        <div id="selectors-container" class="input-group">
          <select id="main-select"></select>
        </div>
      </div>

      <button class="generate-btn" onclick="generatePlan()">Générer ma semaine</button>
    </div>

    <div id="plan-result" class="plan-grid">
      <!-- Resultats ici -->
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="../shared-layout.js"></script>
  <script>
    const MEALS = [
      // Hiver
      { id: 101, title: "Raclette", ingredients: ["fromage à raclette", "pommes de terre", "charcuterie", "oignons"] },
      { id: 102, title: "Fondue savoyarde", ingredients: ["fromage", "pain", "ail", "vin blanc"] },
      { id: 103, title: "Pot-au-feu", ingredients: ["bœuf", "carottes", "poireaux", "pommes de terre"] },
      { id: 104, title: "Tartiflette", ingredients: ["reblochon", "pommes de terre", "lardons", "oignons"] },
      { id: 105, title: "Bœuf bourguignon", ingredients: ["bœuf", "vin rouge", "carottes", "champignons"] },
      { id: 106, title: "Soupe à l’oignon", ingredients: ["oignons", "pain", "fromage", "bouillon"] },
      { id: 107, title: "Cassoulet", ingredients: ["haricots blancs", "saucisses", "confit de canard", "tomates"] },
      { id: 108, title: "Gratin dauphinois", ingredients: ["pommes de terre", "crème", "ail", "lait"] },
      { id: 109, title: "Chili con carne", ingredients: ["bœuf haché", "haricots rouges", "tomates concassées", "oignons"] },
      { id: 110, title: "Blanquette de veau", ingredients: ["veau", "carottes", "champignons", "crème"] },

      // Été
      { id: 201, title: "Salade niçoise", ingredients: ["thon", "œufs", "tomates", "haricots verts"] },
      { id: 202, title: "Gazpacho", ingredients: ["tomates", "concombre", "poivrons", "oignons"] },
      { id: 203, title: "Taboulé", ingredients: ["semoule", "tomates", "concombre", "menthe"] },
      { id: 204, title: "Tian de légumes", ingredients: ["courgette", "aubergine", "tomates", "oignons"] },
      { id: 205, title: "Brochettes de poulet", ingredients: ["blanc de poulet", "poivrons", "oignons", "tomates"] },
      { id: 206, title: "Poke bowl", ingredients: ["riz", "saumon", "avocat", "concombre"] },
      { id: 207, title: "Melon-jambon cru", ingredients: ["melon", "jambon cru", "roquette", "mozzarella"] },
      { id: 208, title: "Ratatouille", ingredients: ["courgette", "aubergine", "poivrons", "tomates"] },
      { id: 209, title: "Wraps au saumon", ingredients: ["saumon fumé", "tortillas", "crème", "concombre"] },
      { id: 210, title: "Carpaccio de bœuf", ingredients: ["bœuf", "parmesan", "roquette", "citron"] },

      // Automne
      { id: 301, title: "Velouté de potimarron", ingredients: ["potimarron", "crème", "oignons", "châtaignes"] },
      { id: 302, title: "Quiche aux champignons", ingredients: ["pâte brisée", "champignons", "œufs", "crème"] },
      { id: 303, title: "Risotto aux cèpes", ingredients: ["riz arborio", "champignons", "parmesan", "vin blanc"] },
      { id: 304, title: "Parmentier de canard", ingredients: ["canard confit", "pommes de terre", "oignons", "crème"] },
      { id: 305, title: "Poulet rôti aux légumes", ingredients: ["blanc de poulet", "carottes", "pommes de terre", "oignons"] },
      { id: 306, title: "Tarte aux poireaux", ingredients: ["pâte brisée", "poireaux", "œufs", "crème"] },
      { id: 307, title: "Curry de lentilles", ingredients: ["lentilles", "lait de coco", "oignons", "carottes"] },
      { id: 308, title: "Gratin de courge", ingredients: ["courge", "crème", "fromage", "chapelure"] },
      { id: 309, title: "Pâtes aux champignons", ingredients: ["spaghetti", "champignons", "crème", "parmesan"] },
      { id: 310, title: "Tourte forestière", ingredients: ["pâte feuilletée", "champignons", "blanc de poulet", "crème"] },

      // Printemps
      { id: 401, title: "Quiche aux asperges", ingredients: ["pâte brisée", "asperges", "œufs", "crème"] },
      { id: 402, title: "Risotto aux petits pois", ingredients: ["riz arborio", "petits pois", "parmesan", "menthe"] },
      { id: 403, title: "Salade de chèvre chaud", ingredients: ["chèvre", "pain", "laitue", "miel"] },
      { id: 404, title: "Omelette aux herbes", ingredients: ["œufs", "ciboulette", "persil", "fromage"] },
      { id: 405, title: "Tarte aux légumes printaniers", ingredients: ["pâte brisée", "petits pois", "asperges", "courgette"] },
      { id: 406, title: "Poulet citron-romarin", ingredients: ["blanc de poulet", "citron", "romarin", "pommes de terre"] },
      { id: 407, title: "Pâtes au pesto", ingredients: ["spaghetti", "basilic", "parmesan", "pignons de pin"] },
      { id: 408, title: "Bowl de légumes verts", ingredients: ["quinoa", "brocoli", "petits pois", "avocat"] },
      { id: 409, title: "Clafoutis salé", ingredients: ["œufs", "lait", "tomates cerises", "fromage de chèvre"] },
      { id: 410, title: "Poisson en papillote", ingredients: ["filets de saumon", "courgette", "citron", "tomates"] },

      // Fêtes
      { id: 501, title: "Foie gras", ingredients: ["foie gras", "pain brioché", "confit d'oignons"] },
      { id: 502, title: "Dinde aux marrons", ingredients: ["dinde", "châtaignes", "carottes", "oignons"] },
      { id: 503, title: "Saumon en croûte", ingredients: ["filets de saumon", "pâte feuilletée", "épinards", "crème"] },
      { id: 504, title: "Chapon rôti", ingredients: ["dinde", "pommes de terre", "châtaignes", "carottes"] },
      { id: 505, title: "Bouchées à la reine", ingredients: ["pâte feuilletée", "blanc de poulet", "champignons", "crème"] },
      { id: 506, title: "Coquilles Saint-Jacques", ingredients: ["noix de saint-jacques", "poireaux", "crème", "vin blanc"] },
      { id: 507, title: "Magret de canard", ingredients: ["canard", "miel", "pommes de terre", "carottes"] },
      { id: 508, title: "Gratin de pommes de terre truffé", ingredients: ["pommes de terre", "crème", "truffe", "parmesan"] },
      { id: 509, title: "Vol-au-vent", ingredients: ["pâte feuilletée", "veau", "champignons", "crème"] },
      { id: 510, title: "Homard rôti", ingredients: ["homard", "beurre", "ail", "citron"] },

      // Rapides
      { id: 601, title: "Croque-monsieur", ingredients: ["pain", "jambon", "fromage", "béchamel"] },
      { id: 602, title: "Pâtes carbonara", ingredients: ["spaghetti", "lardons", "œufs", "parmesan"] },
      { id: 603, title: "Omelette", ingredients: ["œufs", "fromage", "fines herbes"] },
      { id: 604, title: "Quesadillas", ingredients: ["tortillas", "fromage", "blanc de poulet", "poivrons"] },
      { id: 605, title: "Nouilles sautées", ingredients: ["spaghetti", "blanc de poulet", "carottes", "brocoli"] },
      { id: 606, title: "Salade César", ingredients: ["laitue", "blanc de poulet", "croûtons", "parmesan"] },
      { id: 607, title: "Burger maison", ingredients: ["bœuf haché", "pain burger", "fromage", "tomates"] },
      { id: 608, title: "Tacos", ingredients: ["bœuf haché", "tortillas", "laitue", "tomates"] },
      { id: 609, title: "Pizza tortilla", ingredients: ["tortillas", "tomates concassées", "fromage", "basilic"] },
      { id: 610, title: "Sandwich club", ingredients: ["pain", "blanc de poulet", "laitue", "œufs"] }
    ];

    let currentMode = 'meal';
    const DAYS = ["Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi"];

    function init() {
      const ingredients = new Set();
      MEALS.forEach(m => m.ingredients.forEach(i => ingredients.add(i)));
      window.allIngredients = Array.from(ingredients).sort();
      setMode('meal');
    }

    function setMode(mode) {
      currentMode = mode;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase().includes(mode === 'meal' ? 'plat' : 'ingrédient')));
      
      const container = document.getElementById('selectors-container');
      const label = document.getElementById('select-label');
      container.innerHTML = '';
      
      if (mode === 'meal') {
        label.innerText = "Quel plat vous fait envie ?";
        const select = document.createElement('select');
        select.id = 'main-select';
        MEALS.forEach(m => {
          const opt = document.createElement('option');
          opt.value = m.id;
          opt.innerText = m.title;
          select.appendChild(opt);
        });
        container.appendChild(select);
      } else {
        label.innerText = "De quels ingrédients disposez-vous ? (choisissez-en 3)";
        for (let i = 0; i < 3; i++) {
          const select = document.createElement('select');
          select.className = 'ingredient-select';
          
          // Option vide par défaut
          const emptyOpt = document.createElement('option');
          emptyOpt.value = "";
          emptyOpt.innerText = "-- Choisir un ingrédient --";
          select.appendChild(emptyOpt);

          window.allIngredients.forEach(ing => {
            const opt = document.createElement('option');
            opt.value = ing;
            opt.innerText = ing.charAt(0).toUpperCase() + ing.slice(1);
            select.appendChild(opt);
          });
          container.appendChild(select);
        }
      }
    }

    function generatePlan() {
      let plan = [];

      if (currentMode === 'meal') {
        const select = document.getElementById('main-select');
        const value = select.value;
        const anchor = MEALS.find(m => m.id == value);
        plan.push(anchor);
        
        // Trouver les plats qui partagent le plus d'ingrédients
        const others = MEALS.filter(m => m.id != anchor.id)
          .map(m => {
            const common = m.ingredients.filter(i => anchor.ingredients.includes(i)).length;
            return { ...m, score: common };
          })
          .sort((a, b) => b.score - a.score);
        
        plan.push(...others.slice(0, 4));
      } else {
        const selects = document.querySelectorAll('.ingredient-select');
        const selectedIngredients = Array.from(selects).map(s => s.value).filter(v => v !== "");
        
        if (selectedIngredients.length === 0) {
          alert("Veuillez choisir au moins un ingrédient.");
          return;
        }

        // Marquer chaque plat avec un score basé sur les ingrédients choisis
        const scored = MEALS.map(m => {
          const score = selectedIngredients.filter(si => m.ingredients.includes(si)).length;
          return { ...m, score };
        }).sort((a, b) => b.score - a.score);

        // On prend les meilleurs matchs
        plan = scored.slice(0, 5);
      }

      renderPlan(plan);
    }

    function renderPlan(plan) {
      const container = document.getElementById('plan-result');
      container.innerHTML = '';
      
      plan.forEach((meal, i) => {
        const card = document.createElement('div');
        card.className = 'day-card';
        card.innerHTML = `
          <div class="day-label">${DAYS[i]}</div>
          <div class="meal-info">
            <h3>${meal.title}</h3>
            <p class="meal-ingredients">${meal.ingredients.join(' · ')}</p>
          </div>
        `;
        container.appendChild(card);
      });
      
      container.scrollIntoView({ behavior: 'smooth' });
    }

    init();
  </script>
</body>
</html>
