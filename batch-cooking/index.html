<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Batch Cooking - Simplifié</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" />
</head>
<body data-root=".." data-page="batch-cooking">

  <div id="site-header"></div>

  <main>
    <section class="hero">
      <div class="grid-bg" aria-hidden="true"></div>
      <div class="inner">
        <p class="eyebrow">./projets/batch-cooking</p>
        <h1>Organisez votre semaine <span class="text-gradient">en un clic</span>.</h1>
        <p class="lead">Choisissez votre point de départ, nous nous occupons du reste.</p>
      </div>
    </section>

    <div class="batch-container">
      <div class="selector-box">
      <div class="tabs">
        <button class="tab-btn active" onclick="setMode('meal')">Partir d'un plat</button>
        <button class="tab-btn" onclick="setMode('ingredient')">Partir d'un ingrédient</button>
      </div>

      <div class="input-group">
        <label id="select-label">Quel plat vous fait envie ?</label>
        <div id="selectors-container" class="input-group">
          <select id="main-select"></select>
        </div>
      </div>

      <button class="generate-btn" onclick="generatePlan()">Générer ma semaine</button>
    </div>

    <div id="plan-result" class="plan-grid">
      <!-- Resultats ici -->
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="../shared-layout.js"></script>
  <script src="data.js"></script>
  <script>
    let currentMode = 'meal';
    const DAYS = ["Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi"];

    function init() {
      const ingredients = new Set();
      MEALS.forEach(m => m.ingredients.forEach(i => ingredients.add(i)));
      window.allIngredients = Array.from(ingredients).sort();
      setMode('meal');
    }

    function setMode(mode) {
      currentMode = mode;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase().includes(mode === 'meal' ? 'plat' : 'ingrédient')));
      
      const container = document.getElementById('selectors-container');
      const label = document.getElementById('select-label');
      container.innerHTML = '';
      
      if (mode === 'meal') {
        label.innerText = "Quel plat vous fait envie ?";
        const select = document.createElement('select');
        select.id = 'main-select';
        MEALS.forEach(m => {
          const opt = document.createElement('option');
          opt.value = m.id;
          opt.innerText = m.title;
          select.appendChild(opt);
        });
        container.appendChild(select);
      } else {
        label.innerText = "De quels ingrédients disposez-vous ? (choisissez-en 3)";
        for (let i = 0; i < 3; i++) {
          const select = document.createElement('select');
          select.className = 'ingredient-select';
          
          // Option vide par défaut
          const emptyOpt = document.createElement('option');
          emptyOpt.value = "";
          emptyOpt.innerText = "-- Choisir un ingrédient --";
          select.appendChild(emptyOpt);

          window.allIngredients.forEach(ing => {
            const opt = document.createElement('option');
            opt.value = ing;
            opt.innerText = ing.charAt(0).toUpperCase() + ing.slice(1);
            select.appendChild(opt);
          });
          container.appendChild(select);
        }
      }
    }

    function generatePlan() {
      let plan = [];

      if (currentMode === 'meal') {
        const select = document.getElementById('main-select');
        const value = select.value;
        const anchor = MEALS.find(m => m.id == value);
        plan.push(anchor);
        
        // Trouver les plats qui partagent le plus d'ingrédients
        const others = MEALS.filter(m => m.id != anchor.id)
          .map(m => {
            const common = m.ingredients.filter(i => anchor.ingredients.includes(i)).length;
            return { ...m, score: common };
          })
          .sort((a, b) => b.score - a.score);
        
        plan.push(...others.slice(0, 4));
      } else {
        const selects = document.querySelectorAll('.ingredient-select');
        const selectedIngredients = Array.from(selects).map(s => s.value).filter(v => v !== "");
        
        if (selectedIngredients.length === 0) {
          alert("Veuillez choisir au moins un ingrédient.");
          return;
        }

        // Marquer chaque plat avec un score basé sur les ingrédients choisis
        const scored = MEALS.map(m => {
          const score = selectedIngredients.filter(si => m.ingredients.includes(si)).length;
          return { ...m, score };
        }).sort((a, b) => b.score - a.score);

        // On prend les meilleurs matchs
        plan = scored.slice(0, 5);
      }

      renderPlan(plan);
    }

    function renderPlan(plan) {
      const container = document.getElementById('plan-result');
      container.innerHTML = '';
      
      plan.forEach((meal, i) => {
        const card = document.createElement('div');
        card.className = 'day-card';
        card.innerHTML = `
          <div class="day-label">${DAYS[i]}</div>
          <div class="meal-info">
            <h3>${meal.title}</h3>
            <p class="meal-ingredients">${meal.ingredients.join(' · ')}</p>
          </div>
        `;
        container.appendChild(card);
      });
      
      container.scrollIntoView({ behavior: 'smooth' });
    }

    init();
  </script>
</body>
</html>
