<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Encyclopédie - Mind Map - Pierre Duchesne</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" />
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body data-root=".." data-page="encyclopedia">

  <div id="site-header"></div>

  <main class="encyclopedia-shell">
    <aside class="sidebar">
      <div class="sources-list" style="margin-top: 0;">
        <h2>Sachants & Profils</h2>
        <div id="sachants-container">
          <!-- Dynamically filled -->
        </div>
      </div>
    </aside>

    <div class="graph-container">
      <div id="mindmap"></div>
      <div id="tooltip" class="graph-tooltip"></div>
    </div>

    <aside id="profile-detail" class="right-panel">
      <div class="panel-header">
        <h3 id="profile-name"></h3>
        <button class="close-btn" onclick="closeProfile()">&times;</button>
      </div>
      <div id="profile-notes" class="panel-content"></div>
    </aside>
  </main>

  <div id="site-footer"></div>

  <!-- Scripts -->
  <script src="../shared-layout.js"></script>
  <script src="data.js"></script>
  <script src="mindmap.js"></script>
  <script src="app.js"></script>
</body>
</html>
