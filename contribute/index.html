<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contribuer - Pedro Site</title>
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" />
</head>
<body data-page="contribute" data-root="..">
    <div id="site-header"></div>

    <main class="contribute-shell">
        <div class="main-content">
            <div class="section-head">
                <p class="eyebrow">./laboratoire</p>
                <h1 class="serif">Générateur de Contributions</h1>
                <p class="lead">Remplissez le formulaire pour générer une entrée formatée. Elle sera stockée dans votre
                    file d'attente pour un ajout manuel ultérieur au code source.</p>
            </div>

            <div class="form-card">
                <div class="type-selector">
                    <button class="type-btn active" onclick="setTool('encyclopedia')">🧠 Encyclopédie</button>
                    <button class="type-btn" onclick="setTool('recommendation')">🎬 Muse (Recs)</button>
                    <button class="type-btn" onclick="setTool('batchcooking')">🍳 Batch Cooking</button>
                </div>

                <form id="unified-form">
                    <!-- Global Identity -->
                    <div class="form-group" style="border-bottom: 1px solid var(--border); padding-bottom: 1.5rem; margin-bottom: 2rem;">
                        <label>Votre Nom / Pseudo</label>
                        <input type="text" id="contributor-name" placeholder="Qui envoie cette info ?">
                    </div>

                    <!-- Encyclopedia Fields -->
                    <div id="fields-encyclopedia">
                        <div class="form-group">
                            <label>Titre du savoir</label>
                            <input type="text" id="enc-title" placeholder="ex: Effet Dunning-Kruger">
                        </div>
                        <div class="form-group">
                            <label>Contenu / Explication</label>
                            <textarea id="enc-text" rows="4" placeholder="Expliquez ce savoir..."></textarea>
                        </div>
                        <div class="grid-2">
                            <div class="form-group">
                                <label>Catégorie</label>
                                <input type="text" id="enc-category" placeholder="ex: Psychologie">
                            </div>
                        </div>
                    </div>

                    <!-- Recommendation Fields -->
                    <div id="fields-recommendation" class="hidden">
                        <div class="form-group">
                            <label>Quel type de média ?</label>
                            <select id="rec-type" onchange="adaptMuseForm()">
                                <option value="movie">🎬 Film</option>
                                <option value="series">📺 Série</option>
                                <option value="book">📖 Livre</option>
                                <option value="music">🎵 Musique</option>
                                <option value="videogame">🎮 Jeu Vidéo</option>
                                <option value="boardgame">🎲 Jeu de Société</option>
                            </select>
                        </div>

                        <div class="grid-2">
                            <div class="form-group">
                                <label id="label-rec-title">Titre</label>
                                <input type="text" id="rec-title" placeholder="Nom de l'œuvre">
                            </div>
                            <div class="form-group">
                                <label id="label-rec-creator">Créateur</label>
                                <input type="text" id="rec-creator" placeholder="Auteur, Réalisateur...">
                            </div>
                        </div>

                        <div class="grid-2">
                            <div class="form-group">
                                <label>Public</label>
                                <select id="rec-public">
                                    <option value="solo">Solo</option>
                                    <option value="group">Groupe / Amis</option>
                                    <option value="family">Famille</option>
                                </select>
                            </div>
                        </div>

                        <div class="grid-2">
                            <div class="form-group">
                                <label>Genre Principal</label>
                                <input type="text" id="rec-genre" placeholder="Fantasy, Rock, SF...">
                            </div>
                            <div class="form-group">
                                <label>Sous-genres</label>
                                <input type="text" id="rec-subgenres" placeholder="Tags séparés par virgules">
                            </div>
                        </div>

                        <div class="grid-2" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                            <div class="form-group">
                                <label id="label-rec-duration">Durée</label>
                                <input type="text" id="rec-duration" placeholder="ex: 2h 30m, 400p">
                            </div>
                            <div class="form-group">
                                <label>Complexité (1-5)</label>
                                <input type="range" id="rec-complexity" min="1" max="5" value="3">
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Pitch / Pitch court</label>
                            <textarea id="rec-pitch" rows="2" placeholder="De quoi s'agit-il ?"></textarea>
                        </div>

                        <div class="grid-2">
                            <div class="form-group">
                                <label>Émotion principale</label>
                                <input type="text" id="rec-emotion" placeholder="Relaxant, intense, triste...">
                            </div>
                            <div class="form-group">
                                <label>Ambiance</label>
                                <input type="text" id="rec-ambiance" placeholder="Cozy, dark, épique...">
                            </div>
                        </div>

                    </div>

                    <!-- Batch Cooking Fields -->
                    <div id="fields-batchcooking" class="hidden">
                        <div class="form-group">
                            <label>Nom du plat</label>
                            <input type="text" id="bc-title" placeholder="ex: Lasagnes">
                        </div>
                        <div class="form-group">
                            <label>Ingrédients (séparés par virgules)</label>
                            <textarea id="bc-ingredients" rows="3"
                                placeholder="ex: pâtes, tomates, boeuf..."></textarea>
                        </div>
                    </div>

                    <button type="button" class="submit-btn" onclick="generateContribution()">Générer et
                        stocker</button>
                </form>
            </div>
        </div>

        <aside class="queue-card">
            <div class="queue-title">
                <span>Boîte d'envoi</span>
                <div style="display:flex; gap: 0.5rem;">
                    <button class="btn btn-ghost btn-sm" onclick="downloadQueue()"
                        style="font-size: 0.6rem; border: 1px solid var(--border);">⬇ Export</button>
                    <button class="btn btn-ghost btn-sm" onclick="clearQueue()"
                        style="font-size: 0.6rem; border: 1px solid var(--border);">Vider</button>
                </div>
            </div>
            <button id="formspree-btn" class="submit-btn" onclick="sendViaFormspree()"
                style="background: #6366f1; margin-bottom: 1rem; font-size: 0.85rem;">
                🚀 Transmettre à Pierre (Formspree)
            </button>

            <div id="contribution-queue">
                <!-- Items will appear here -->
            </div>
        </aside>
    </main>

    <div id="site-footer"></div>

    <script src="../shared-layout.js"></script>
    <script>
        let currentTool = 'encyclopedia';
        let queue = JSON.parse(localStorage.getItem('pending_contributions') || '[]');

        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.type-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toLowerCase().includes(tool === 'batchcooking' ? 'cooking' : tool === 'recommendation' ? 'muse' : tool));
            });
            document.getElementById('fields-encyclopedia').classList.toggle('hidden', tool !== 'encyclopedia');
            document.getElementById('fields-recommendation').classList.toggle('hidden', tool !== 'recommendation');
            document.getElementById('fields-batchcooking').classList.toggle('hidden', tool !== 'batchcooking');
            if (tool === 'recommendation') adaptMuseForm();
        }

        function adaptMuseForm() {
            const type = document.getElementById('rec-type').value;
            const labelTitle = document.getElementById('label-rec-title');
            const creatorGroup = document.getElementById('label-rec-creator').parentElement;
            const creatorInput = document.getElementById('rec-creator');
            const durationInput = document.getElementById('rec-duration');
            
            const config = {
                movie: { title: "Titre du film", creator: "Réalisateur", placeholder: "ex: Christopher Nolan", dur: "Durée", durPh: "ex: 2h 15m" },
                series: { title: "Titre de la série", creator: "Showrunner / Chaîne", placeholder: "ex: HBO", dur: "Saisons / Éps", durPh: "ex: 5 saisons" },
                book: { title: "Titre du livre", creator: "Auteur / Écrivain", placeholder: "ex: Albert Camus", dur: "Pages", durPh: "ex: 350p" },
                music: { title: "Titre de l'album / morceau", creator: "Artiste / Groupe", placeholder: "ex: Pink Floyd", dur: "Format", durPh: "ex: Album, EP, Single" },
                videogame: { title: "Nom du jeu", creator: "Studio / Développeur", placeholder: "ex: FromSoftware", dur: "Temps de jeu", durPh: "ex: 40h" },
                boardgame: { title: "Nom du jeu de société", creator: "Auteur / Éditeur", placeholder: "ex: Antoine Bauza", dur: "Partie moyenne", durPh: "ex: 45m" }
            };

            const c = config[type];
            labelTitle.innerText = c.title;
            labelDuration.innerText = c.dur;
            durationInput.placeholder = c.durPh;

            if (type === 'book' || type === 'music') {
                creatorGroup.classList.remove('hidden');
                document.getElementById('label-rec-creator').innerText = c.creator;
                creatorInput.placeholder = c.placeholder;
            } else {
                creatorGroup.classList.add('hidden');
                creatorInput.value = ''; // On vide pour la cohérence
            }
        }

        function generateContribution() {
            const contributor = document.getElementById('contributor-name').value || "Anonyme";
            let item = { timestamp: new Date().toISOString(), tool: currentTool, data: { contributor } };

            if (currentTool === 'encyclopedia') {
                Object.assign(item.data, {
                    title: document.getElementById('enc-title').value,
                    text: document.getElementById('enc-text').value,
                    category: document.getElementById('enc-category').value,
                    source: contributor // Le nom du contributeur devient la source
                });
            } else if (currentTool === 'recommendation') {
                Object.assign(item.data, {
                    id: "u" + Date.now().toString().slice(-6),
                    type: document.getElementById('rec-type').value,
                    title: document.getElementById('rec-title').value,
                    creator: document.getElementById('rec-creator').value,
                    main_genre: document.getElementById('rec-genre').value,
                    sub_genres: document.getElementById('rec-subgenres').value.split(',').map(s => s.trim()).filter(Boolean),
                    duration: document.getElementById('rec-duration').value,
                    main_emotion: document.getElementById('rec-emotion').value,
                    complexity: parseInt(document.getElementById('rec-complexity').value),
                    ambiance: document.getElementById('rec-ambiance').value,
                    public: document.getElementById('rec-public').value,
                    pitch: document.getElementById('rec-pitch').value
                });
            } else {
                Object.assign(item.data, {
                    id: Math.floor(Math.random() * 1000) + 1000,
                    title: document.getElementById('bc-title').value,
                    ingredients: document.getElementById('bc-ingredients').value.split(',').map(s => s.trim()).filter(Boolean)
                });
            }

            if (!item.data.title) return alert("Le titre est obligatoire !");

            queue.push(item);
            localStorage.setItem('pending_contributions', JSON.stringify(queue));
            renderQueue();

            // Reset current form
            document.getElementById('unified-form').reset();
        }

        async function sendViaFormspree() {
            if (queue.length === 0) return alert("Rien à envoyer !");

            const FORMSPREE_ID = "meenoaez";
            const btn = document.getElementById('formspree-btn');
            const originalText = btn.innerText;

            try {
                btn.innerText = "Envoi en cours...";
                btn.disabled = true;

                const response = await fetch(`https://formspree.io/f/${FORMSPREE_ID}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `Nouvelles contributions de ${window.location.hostname}`,
                        contributions: queue.map(item => item.data)
                    })
                });

                if (response.ok) {
                    alert("Merci ! Vos contributions ont été envoyées avec succès.");
                    clearQueue();
                } else {
                    throw new Error("Erreur Formspree");
                }
            } catch (error) {
                alert("Une erreur est survenue lors de l'envoi. Vérifiez votre ID Formspree ou réessayez.");
                console.error(error);
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        function downloadQueue() {
            if (queue.length === 0) return alert("La file d'attente est vide !");

            const dataStr = JSON.stringify(queue.map(item => item.data), null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);

            const link = document.createElement("a");
            link.href = url;
            link.download = `contributions_${new Date().toISOString().slice(0, 10)}.json`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function renderQueue() {
            const container = document.getElementById('contribution-queue');
            document.querySelector('.queue-title span').innerText = `Boîte d'envoi (${queue.length})`;

            if (queue.length === 0) {
                container.innerHTML = '<div class="empty-queue">Aucune contribution en attente.</div>';
                return;
            }

            container.innerHTML = queue.map((item, index) => `
            <div class="queue-item">
                <span class="tag">${item.tool}</span>
                <strong>${item.data.title}</strong>
                <button class="copy-btn" onclick="copyItem(${index})">Copier JSON</button>
                <code>${JSON.stringify(item.data, null, 2)}</code>
            </div>
        `).reverse().join('');
        }

        function copyItem(index) {
            const text = JSON.stringify(queue[index].data, null, 2);
            navigator.clipboard.writeText(text).then(() => {
                alert("JSON copié ! Vous pouvez maintenant le coller dans votre fichier data.js");
            });
        }

        function clearQueue() {
            if (confirm("Voulez-vous vraiment vider la file d'attente ?")) {
                queue = [];
                localStorage.setItem('pending_contributions', '[]');
                renderQueue();
            }
        }

        renderQueue();
    </script>
    <script src="../shared-layout.js"></script>
</body>

</html>
