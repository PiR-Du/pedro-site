<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Board Game Score Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0e0e12;
    --surface: #17171f;
    --surface2: #1f1f2b;
    --border: #2a2a38;
    --accent: #f0c040;
    --accent2: #e05c5c;
    --text: #eeeef5;
    --muted: #7a7a99;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* ─── HEADER ─── */
  header {
    background: linear-gradient(135deg, #1a1a24 0%, #0e0e12 100%);
    border-bottom: 1px solid var(--border);
    padding: 22px 32px;
    display: flex;
    align-items: center;
    gap: 18px;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 3px;
    color: var(--accent);
    line-height: 1;
  }
  .logo span { color: var(--text); }
  .round-badge {
    margin-left: auto;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 6px 16px;
    border-radius: 100px;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .round-badge strong { color: var(--accent); }

  /* ─── TABS ─── */
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    padding: 0 32px;
  }
  .tab {
    padding: 14px 22px;
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .2s;
    letter-spacing: .5px;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ─── VIEWS ─── */
  .view { display: none; padding: 32px; max-width: 980px; margin: 0 auto; }
  .view.active { display: block; }

  /* ─── SETUP ─── */
  .setup-header { margin-bottom: 28px; }
  .setup-header h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 2px; color: var(--text); }
  .setup-header p { color: var(--muted); font-size: 0.9rem; margin-top: 4px; }

  .form-group { margin-bottom: 22px; }
  label { display: block; font-size: 0.8rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  input[type=text], input[type=number] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color .2s;
  }
  input:focus { border-color: var(--accent); }

  .player-count-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .count-btn {
    width: 38px; height: 38px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 1.2rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .count-btn:hover { border-color: var(--accent); color: var(--accent); }
  .count-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    color: var(--accent);
    min-width: 30px;
    text-align: center;
  }

  .players-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }
  .player-input-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .color-dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.1);
  }
  .player-input-card input {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    border-radius: 0;
    padding: 4px 0;
    font-size: 0.9rem;
  }
  .player-input-card input:focus { border-bottom-color: var(--accent); }

  /* ─── BUTTONS ─── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    border-radius: 10px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
    letter-spacing: .3px;
  }
  .btn-primary { background: var(--accent); color: #111; }
  .btn-primary:hover { background: #ffd060; transform: translateY(-1px); }
  .btn-danger { background: #3a1515; color: var(--accent2); border: 1px solid #5c2020; }
  .btn-danger:hover { background: #4a1a1a; }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* ─── SCOREBOARD ─── */
  .scoreboard-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 14px;
    margin-bottom: 32px;
  }
  .player-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 16px;
    text-align: center;
    position: relative;
    transition: transform .2s;
  }
  .player-card.leader {
    border-color: var(--accent);
    box-shadow: 0 0 20px rgba(240,192,64,0.12);
  }
  .player-card .crown {
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 1.1rem;
  }
  .player-avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    margin: 0 auto 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    color: #111;
  }
  .player-name {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .8px;
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .player-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    line-height: 1;
    color: var(--text);
  }
  .player-card.leader .player-score { color: var(--accent); }
  .player-delta {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 4px;
  }
  .player-delta.pos { color: #6dd47e; }
  .player-delta.neg { color: var(--accent2); }

  /* ─── ADD ROUND ─── */
  .round-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
    margin-bottom: 28px;
  }
  .round-panel h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 18px;
  }
  .round-inputs {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 18px;
  }
  .round-input-field label {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .round-input-field .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .round-input-field input[type=number] {
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    padding: 10px;
  }

  /* ─── HISTORY TABLE ─── */
  .history-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.88rem;
    margin-top: 10px;
  }
  .history-table th {
    text-align: left;
    padding: 10px 14px;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    font-weight: 600;
  }
  .history-table td {
    padding: 10px 14px;
    border-bottom: 1px solid rgba(42,42,56,0.5);
    color: var(--text);
  }
  .history-table tr:last-child td { border-bottom: none; }
  .history-table tr:hover td { background: rgba(255,255,255,0.02); }
  .round-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    color: var(--muted);
  }

  /* ─── STATS ─── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
    margin-bottom: 32px;
  }
  .stat-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
  }
  .stat-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    color: var(--accent);
    line-height: 1;
  }
  .stat-sub {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 4px;
  }

  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 28px;
  }
  @media (max-width: 650px) { .charts-grid { grid-template-columns: 1fr; } }
  .chart-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .chart-card h4 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 16px;
  }

  /* ─── EMPTY STATE ─── */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty .icon { font-size: 3rem; margin-bottom: 12px; }
  .empty p { font-size: 0.95rem; }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--accent);
    color: #111;
    padding: 12px 20px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 0.88rem;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    transform: translateY(80px);
    opacity: 0;
    transition: all .3s cubic-bezier(.34,1.56,.64,1);
    z-index: 999;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 16px;
    margin-top: 28px;
  }

  .actions-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 8px;
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">🎲 <span>Score</span>Board</div>
  </div>
  <div class="round-badge" id="roundBadge" style="display:none">
    Round <strong id="roundCount">0</strong>
  </div>
</header>

<div class="tabs">
  <div class="tab active" data-tab="setup">Setup</div>
  <div class="tab" data-tab="game" id="tabGame">Scoreboard</div>
  <div class="tab" data-tab="stats" id="tabStats">Stats & Charts</div>
</div>

<!-- ─── SETUP VIEW ─── -->
<div class="view active" id="view-setup">
  <div class="setup-header">
    <h2>New Game Setup</h2>
    <p>Configure players and start tracking scores round by round.</p>
  </div>

  <div class="form-group">
    <label>Game Name</label>
    <input type="text" id="gameName" placeholder="e.g. Catan, Scrabble, Pandemic..." value="Board Game">
  </div>

  <div class="form-group">
    <label>Number of Players</label>
    <div class="player-count-row">
      <button class="count-btn" onclick="changeCount(-1)">−</button>
      <div class="count-display" id="countDisplay">4</div>
      <button class="count-btn" onclick="changeCount(1)">+</button>
    </div>
  </div>

  <label>Player Names</label>
  <div class="players-grid" id="playersGrid"></div>

  <button class="btn btn-primary" onclick="startGame()">🚀 Start Game</button>
</div>

<!-- ─── GAME VIEW ─── -->
<div class="view" id="view-game">
  <div class="scoreboard-grid" id="scoreboardGrid"></div>

  <div class="round-panel">
    <h3>➕ Add Round Scores</h3>
    <div class="round-inputs" id="roundInputs"></div>
    <div class="actions-row">
      <button class="btn btn-primary" onclick="submitRound()">Submit Round</button>
      <button class="btn btn-ghost" onclick="clearRoundInputs()">Clear</button>
    </div>
  </div>

  <div class="section-title">Round History</div>
  <div id="historyContainer"></div>

  <div style="margin-top:28px">
    <button class="btn btn-danger" onclick="confirmReset()">🗑 Reset Game</button>
  </div>
</div>

<!-- ─── STATS VIEW ─── -->
<div class="view" id="view-stats">
  <div id="statsContent"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'http://localhost:8765/api';

const COLORS = [
  '#f0c040','#e05c5c','#5caaee','#6dd47e',
  '#c47bdd','#f07850','#50d4c4','#f0a0c0'
];

let state = { players: [], rounds: [], game_name: 'Board Game' };
let playerCount = 4;
let charts = {};

// ─── TAB NAV ───
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    const tab = t.dataset.tab;
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('view-' + tab).classList.add('active');
    if (tab === 'stats') renderStats();
  });
});

// ─── SETUP ───
function changeCount(d) {
  playerCount = Math.min(8, Math.max(2, playerCount + d));
  document.getElementById('countDisplay').textContent = playerCount;
  renderSetupGrid();
}

function renderSetupGrid() {
  const grid = document.getElementById('playersGrid');
  const existing = [...grid.querySelectorAll('input')].map(i => i.value);
  grid.innerHTML = '';
  for (let i = 0; i < playerCount; i++) {
    const card = document.createElement('div');
    card.className = 'player-input-card';
    card.innerHTML = `
      <div class="color-dot" style="background:${COLORS[i]}"></div>
      <input type="text" placeholder="Player ${i+1}" value="${existing[i] || ''}">
    `;
    grid.appendChild(card);
  }
}

async function startGame() {
  const inputs = document.querySelectorAll('#playersGrid input');
  const players = [...inputs].map((inp, i) => inp.value.trim() || `Player ${i+1}`);
  const gameName = document.getElementById('gameName').value.trim() || 'Board Game';

  await fetch(`${API}/game/setup`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ players, colors: COLORS.slice(0, players.length), game_name: gameName })
  });

  await loadState();
  switchTab('game');
  toast('Game started! 🎲');
}

// ─── LOAD STATE ───
async function loadState() {
  try {
    const res = await fetch(`${API}/game`);
    state = await res.json();
    renderGame();
    updateHeader();
  } catch {
    // Server not running fallback
    showServerError();
  }
}

function updateHeader() {
  const badge = document.getElementById('roundBadge');
  const count = document.getElementById('roundCount');
  if (state.rounds.length > 0) {
    badge.style.display = '';
    count.textContent = state.rounds.length;
  } else {
    badge.style.display = 'none';
  }
  document.title = (state.game_name || 'Board Game') + ' · ScoreBoard';
}

// ─── RENDER GAME ───
function renderGame() {
  renderScoreboard();
  renderRoundInputs();
  renderHistory();
}

function getTotals() {
  const totals = state.players.map(() => 0);
  state.rounds.forEach(r => r.scores.forEach((s, i) => totals[i] += s));
  return totals;
}

function renderScoreboard() {
  const totals = getTotals();
  const max = Math.max(...totals);
  const grid = document.getElementById('scoreboardGrid');
  grid.innerHTML = '';

  const lastRound = state.rounds[state.rounds.length - 1];

  state.players.forEach((p, i) => {
    const isLeader = totals[i] === max && state.rounds.length > 0;
    const delta = lastRound ? lastRound.scores[i] : null;
    const deltaClass = delta > 0 ? 'pos' : delta < 0 ? 'neg' : '';
    const deltaText = delta !== null ? (delta >= 0 ? `+${delta}` : delta) + ' last round' : '';
    grid.innerHTML += `
      <div class="player-card ${isLeader ? 'leader' : ''}">
        ${isLeader ? '<div class="crown">👑</div>' : ''}
        <div class="player-avatar" style="background:${p.color}">${p.name[0].toUpperCase()}</div>
        <div class="player-name">${p.name}</div>
        <div class="player-score">${totals[i]}</div>
        <div class="player-delta ${deltaClass}">${deltaText || '&nbsp;'}</div>
      </div>
    `;
  });
}

function renderRoundInputs() {
  const div = document.getElementById('roundInputs');
  div.innerHTML = '';
  state.players.forEach((p, i) => {
    div.innerHTML += `
      <div class="round-input-field">
        <label>
          <span class="dot" style="background:${p.color}"></span>
          ${p.name}
        </label>
        <input type="number" id="ri_${i}" placeholder="0" value="">
      </div>
    `;
  });
}

function renderHistory() {
  const container = document.getElementById('historyContainer');
  if (state.rounds.length === 0) {
    container.innerHTML = '<div class="empty"><div class="icon">📋</div><p>No rounds yet. Add the first round above!</p></div>';
    return;
  }

  let html = `<table class="history-table"><thead><tr><th>Round</th>`;
  state.players.forEach(p => {
    html += `<th><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${p.color};margin-right:6px"></span>${p.name}</th>`;
  });
  html += `<th>Leader</th></tr></thead><tbody>`;

  let running = state.players.map(() => 0);
  state.rounds.forEach(r => {
    r.scores.forEach((s, i) => running[i] += s);
    const max = Math.max(...running);
    const leaderIdx = running.indexOf(max);
    html += `<tr><td class="round-num">#${r.round}</td>`;
    r.scores.forEach((s, i) => {
      html += `<td>${s >= 0 ? '+' : ''}${s} <span style="color:var(--muted);font-size:.78rem">(${running[i]})</span></td>`;
    });
    html += `<td><span style="color:${state.players[leaderIdx].color}">${state.players[leaderIdx].name}</span></td></tr>`;
  });

  html += '</tbody></table>';
  container.innerHTML = html;
}

// ─── ADD ROUND ───
async function submitRound() {
  if (state.players.length === 0) return toast('Set up a game first!');
  const scores = state.players.map((_, i) => {
    const v = document.getElementById(`ri_${i}`)?.value;
    return v === '' || v === null ? 0 : parseInt(v) || 0;
  });

  await fetch(`${API}/game/round`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ scores })
  });

  await loadState();
  toast(`Round ${state.rounds.length} added ✓`);
}

function clearRoundInputs() {
  state.players.forEach((_, i) => {
    const el = document.getElementById(`ri_${i}`);
    if (el) el.value = '';
  });
}

// ─── STATS ───
function renderStats() {
  const div = document.getElementById('statsContent');
  if (state.players.length === 0 || state.rounds.length === 0) {
    div.innerHTML = '<div class="empty"><div class="icon">📊</div><p>Play some rounds first to see stats and charts!</p></div>';
    return;
  }

  const totals = getTotals();
  const max = Math.max(...totals);
  const leaderIdx = totals.indexOf(max);

  // Best single round
  let bestRound = { score: -Infinity, player: '', round: 0 };
  state.rounds.forEach(r => {
    r.scores.forEach((s, i) => {
      if (s > bestRound.score) bestRound = { score: s, player: state.players[i].name, round: r.round };
    });
  });

  // Avg per round
  const avgs = totals.map(t => (t / state.rounds.length).toFixed(1));

  div.innerHTML = `
    <div class="section-title">Summary</div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">🏆 Leader</div>
        <div class="stat-value" style="color:${state.players[leaderIdx].color}">${state.players[leaderIdx].name}</div>
        <div class="stat-sub">${max} total points</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">📅 Rounds Played</div>
        <div class="stat-value">${state.rounds.length}</div>
        <div class="stat-sub">rounds completed</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">⚡ Best Single Round</div>
        <div class="stat-value">${bestRound.score}</div>
        <div class="stat-sub">${bestRound.player} in round ${bestRound.round}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">📈 Avg per Round</div>
        <div class="stat-value">${Math.max(...avgs.map(Number)).toFixed(1)}</div>
        <div class="stat-sub">${state.players[totals.indexOf(max)].name}'s average</div>
      </div>
    </div>

    <div class="charts-grid">
      <div class="chart-card">
        <h4>📈 Score Progression</h4>
        <canvas id="lineChart"></canvas>
      </div>
      <div class="chart-card">
        <h4>🍩 Total Scores</h4>
        <canvas id="doughnutChart"></canvas>
      </div>
      <div class="chart-card">
        <h4>📊 Points Per Round</h4>
        <canvas id="barChart"></canvas>
      </div>
      <div class="chart-card">
        <h4>🎯 Average Per Round</h4>
        <canvas id="avgChart"></canvas>
      </div>
    </div>

    <div class="section-title">Per-Player Breakdown</div>
    <div class="stats-grid">
      ${state.players.map((p, i) => {
        const rounds = state.rounds.map(r => r.scores[i]);
        const best = Math.max(...rounds);
        const worst = Math.min(...rounds);
        return `
        <div class="stat-card">
          <div class="stat-label" style="color:${p.color}">● ${p.name}</div>
          <div class="stat-value" style="font-size:1.4rem">${totals[i]}</div>
          <div class="stat-sub">Avg ${avgs[i]} · Best +${best} · Worst ${worst}</div>
        </div>`;
      }).join('')}
    </div>
  `;

  // Destroy old charts
  Object.values(charts).forEach(c => c.destroy());
  charts = {};

  const chartDefaults = {
    color: '#7a7a99',
    plugins: { legend: { labels: { color: '#7a7a99', font: { family: 'DM Sans' } } } }
  };

  const labels = state.rounds.map(r => `R${r.round}`);

  // Line chart: cumulative
  const cumulativeData = state.players.map((p, pi) => {
    let sum = 0;
    return { label: p.name, data: state.rounds.map(r => (sum += r.scores[pi], sum)), borderColor: p.color, backgroundColor: p.color + '22', tension: 0.4, fill: true };
  });
  charts.line = new Chart(document.getElementById('lineChart'), {
    type: 'line',
    data: { labels, datasets: cumulativeData },
    options: { ...chartDefaults, scales: { x: { ticks: { color: '#7a7a99' }, grid: { color: '#2a2a38' } }, y: { ticks: { color: '#7a7a99' }, grid: { color: '#2a2a38' } } } }
  });

  // Doughnut
  charts.donut = new Chart(document.getElementById('doughnutChart'), {
    type: 'doughnut',
    data: {
      labels: state.players.map(p => p.name),
      datasets: [{ data: totals, backgroundColor: state.players.map(p => p.color), borderColor: '#17171f', borderWidth: 3 }]
    },
    options: { ...chartDefaults }
  });

  // Bar: per round per player
  const barData = state.players.map((p, pi) => ({
    label: p.name,
    data: state.rounds.map(r => r.scores[pi]),
    backgroundColor: p.color + 'cc',
    borderRadius: 4
  }));
  charts.bar = new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: { labels, datasets: barData },
    options: { ...chartDefaults, scales: { x: { ticks: { color: '#7a7a99' }, grid: { color: '#2a2a38' } }, y: { ticks: { color: '#7a7a99' }, grid: { color: '#2a2a38' } }, stacked: false } }
  });

  // Avg bar
  charts.avg = new Chart(document.getElementById('avgChart'), {
    type: 'bar',
    data: {
      labels: state.players.map(p => p.name),
      datasets: [{
        label: 'Avg pts/round',
        data: avgs.map(Number),
        backgroundColor: state.players.map(p => p.color + 'cc'),
        borderRadius: 6
      }]
    },
    options: { ...chartDefaults, indexAxis: 'y', scales: { x: { ticks: { color: '#7a7a99' }, grid: { color: '#2a2a38' } }, y: { ticks: { color: '#7a7a99' }, grid: { color: '#2a2a38' } } } }
  });
}

// ─── UTILS ───
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.id === 'view-' + name));
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

async function confirmReset() {
  if (!confirm('Reset the game? All scores will be lost.')) return;
  await fetch(`${API}/game/reset`, { method: 'POST' });
  state = { players: [], rounds: [], game_name: 'Board Game' };
  switchTab('setup');
  updateHeader();
  toast('Game reset');
}

function showServerError() {
  document.querySelector('.view.active').innerHTML = `
    <div class="empty">
      <div class="icon">⚠️</div>
      <p style="color:var(--accent2)">Cannot connect to the Python server.<br><br>
      Make sure you ran: <code style="background:#1f1f2b;padding:4px 8px;border-radius:6px;font-size:.85rem">python server.py</code><br>
      then refresh this page.</p>
    </div>`;
}

// ─── INIT ───
renderSetupGrid();
loadState().then(() => {
  if (state.players.length > 0) {
    switchTab('game');
  }
});
</script>
</body>
</html>
